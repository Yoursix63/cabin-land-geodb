<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>cabin-land-geodb</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root {
  --bg: #14181d; --panel: #1c2229; --panel2: #232b34; --line: #303a45;
  --text: #d8dee5; --dim: #8a97a5; --accent: #e8a33d; --good: #4caf50;
}
* { box-sizing: border-box; margin: 0; }
body { font: 13px/1.45 'Segoe UI', system-ui, sans-serif; background: var(--bg);
       color: var(--text); height: 100vh; display: flex; flex-direction: column; }
header { display: flex; align-items: center; gap: 14px; padding: 8px 14px;
         background: var(--panel); border-bottom: 1px solid var(--line); z-index: 1000; }
header h1 { font-size: 15px; font-weight: 600; letter-spacing: .04em; }
header .sub { color: var(--dim); font-size: 12px; }
header button { margin-left: auto; }
#layout { flex: 1; display: flex; min-height: 0; }
#sidebar { width: 300px; background: var(--panel); border-right: 1px solid var(--line);
           display: flex; flex-direction: column; min-height: 0; }
#filters { padding: 10px 12px; border-bottom: 1px solid var(--line); }
#filters .row { display: flex; gap: 6px; margin-bottom: 6px; align-items: center; }
#filters label { color: var(--dim); font-size: 11px; width: 78px; flex: none; }
#filters input[type=number], #filters input[type=text], #filters select {
  width: 100%; background: var(--panel2); color: var(--text);
  border: 1px solid var(--line); border-radius: 3px; padding: 3px 6px; font-size: 12px; }
#filters .checks { display: flex; gap: 14px; margin: 6px 0; }
#filters .checks label { width: auto; color: var(--text); font-size: 12px; }
button { background: var(--accent); color: #1a1408; border: 0; border-radius: 3px;
         padding: 5px 12px; font-weight: 600; font-size: 12px; cursor: pointer; }
button.ghost { background: var(--panel2); color: var(--text); border: 1px solid var(--line); }
#list { flex: 1; overflow-y: auto; }
.item { padding: 7px 12px; border-bottom: 1px solid var(--line); cursor: pointer; }
.item:hover { background: var(--panel2); }
.item .top { display: flex; justify-content: space-between; }
.item .score { font-weight: 700; }
.item .meta { color: var(--dim); font-size: 11px; }
#map { flex: 1; }
#detail { position: absolute; top: 52px; right: 10px; width: 320px; max-height: calc(100% - 90px);
          overflow-y: auto; background: var(--panel); border: 1px solid var(--line);
          border-radius: 6px; padding: 14px; z-index: 1001; display: none; }
#detail h2 { font-size: 14px; margin-bottom: 2px; }
#detail .big { font-size: 30px; font-weight: 700; }
#detail table { width: 100%; border-collapse: collapse; margin: 8px 0; }
#detail td { padding: 3px 0; border-bottom: 1px solid var(--line); font-size: 12px; }
#detail td:last-child { text-align: right; }
.bar { height: 6px; background: var(--panel2); border-radius: 3px; margin: 2px 0 7px; }
.bar i { display: block; height: 100%; border-radius: 3px; }
.close { float: right; cursor: pointer; color: var(--dim); font-size: 16px; }
#legend { position: absolute; bottom: 18px; right: 10px; background: var(--panel);
          border: 1px solid var(--line); border-radius: 5px; padding: 8px 10px;
          font-size: 11px; z-index: 1000; }
#legend .ramp { width: 140px; height: 10px; border-radius: 2px; margin: 4px 0;
  background: linear-gradient(90deg, #c0392b, #e8a33d, #d7d34f, #4caf50); }
#legend .lab { display: flex; justify-content: space-between; color: var(--dim); }
#status { position: absolute; top: 60px; left: 320px; z-index: 1000; background: var(--panel);
          border: 1px solid var(--line); border-radius: 4px; padding: 4px 10px;
          font-size: 11px; color: var(--dim); }
#weights { position: absolute; inset: 0; background: rgba(0,0,0,.55); z-index: 2000;
           display: none; align-items: center; justify-content: center; }
#weights .box { background: var(--panel); border: 1px solid var(--line); border-radius: 8px;
                padding: 18px; width: 420px; }
#weights .row { display: grid; grid-template-columns: 90px 1fr 40px; gap: 10px;
                align-items: center; margin-bottom: 8px; }
#weights small { grid-column: 1 / -1; color: var(--dim); margin: -6px 0 4px; }
.listing-tag { display: inline-block; background: #6b3419; color: #ffb37a;
               padding: 1px 7px; border-radius: 8px; font-size: 11px; margin: 2px 0; }
a { color: var(--accent); }
</style>
</head>
<body>
<header>
  <h1>CABIN-LAND GEODB</h1>
  <span class="sub" id="hdrstats">loading…</span>
  <button class="ghost" onclick="openWeights()">weights</button>
</header>
<div id="layout">
  <div id="sidebar">
    <div id="filters">
      <div class="row"><label>min score</label><input type="number" id="f_min_score" value="80"></div>
      <div class="row"><label>acres</label>
        <input type="number" id="f_min_acres" placeholder="min" value="5">
        <input type="number" id="f_max_acres" placeholder="max" value="100"></div>
      <div class="row"><label>max drive</label><input type="number" id="f_max_drive" placeholder="min"></div>
      <div class="row"><label>max slope°</label><input type="number" id="f_max_slope" placeholder="deg"></div>
      <div class="row"><label>min septic%</label><input type="number" id="f_min_septic" placeholder="%"></div>
      <div class="row"><label>state</label>
        <select id="f_state" onchange="fillCountySelect()">
          <option value="">all</option><option>VA</option><option>WV</option>
          <option>MD</option><option>PA</option><option>DE</option></select>
        <select id="f_county_fips"><option value="">all counties</option></select></div>
      <div class="row"><label>address</label>
        <input type="text" id="f_address" placeholder="contains… (WV only)"></div>
      <div class="row"><label>structure</label>
        <select id="f_structure">
          <option value="">any</option>
          <option value="with">with structure</option>
          <option value="without">without structure</option></select></div>
      <div class="row"><label>max value $</label>
        <input type="number" id="f_max_value" placeholder="total">
        <input type="number" id="f_max_ppa" placeholder="$/acre"></div>
      <div class="row"><label>seclusion</label>
        <input type="number" id="f_min_nbr_dist" placeholder="min nbr m">
        <input type="number" id="f_max_nbr_1km" placeholder="max ≤1km"></div>
      <div class="row"><label>min grocery</label>
        <input type="number" id="f_min_grocery" placeholder="km"></div>
      <div class="checks">
        <label><input type="checkbox" id="f_dry" checked> dry only</label>
        <label><input type="checkbox" id="f_sale"> for sale</label>
        <label><input type="checkbox" id="f_public"> borders public land</label>
      </div>
      <button onclick="applyFilters()">apply</button>
      <button class="ghost" onclick="resetFilters()">reset</button>
    </div>
    <div id="list"></div>
  </div>
  <div id="map"></div>
</div>
<div id="status">county view — zoom in for parcels</div>
<div id="detail"></div>
<div id="legend"><b>score</b><div class="ramp"></div>
  <div class="lab"><span>0</span><span>50</span><span>100</span></div>
  <div style="margin-top:5px"><span style="color:#ff8c42">▬</span> for sale</div>
</div>
<div id="weights"><div class="box">
  <h2 style="margin-bottom:10px">scoring weights</h2>
  <div id="wrows"></div>
  <div style="display:flex; gap:8px; margin-top:12px">
    <button onclick="saveWeights()">apply &amp; re-rank</button>
    <button class="ghost" onclick="resetWeights()">reset to defaults</button>
    <button class="ghost" onclick="document.getElementById('weights').style.display='none'">cancel</button>
  </div>
</div></div>
<script>
const PARCEL_ZOOM = 12;
const map = L.map('map', { zoomControl: true }).setView([38.7, -78.4], 8);
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',
  { attribution: '&copy; OSM &copy; CARTO', maxZoom: 19 }).addTo(map);
// The embedded preview can lay out the container after Leaflet init,
// leaving a cached 0x0 size (no tiles, NaN on flyTo). Re-measure on
// any container resize.
new ResizeObserver(() => map.invalidateSize()).observe(document.getElementById('map'));

let countyLayer = null, parcelLayer = null, selLayer = null;
let filters = {};

function scoreColor(s) {
  if (s == null) return '#555';
  const stops = [[0,'#c0392b'],[45,'#e8a33d'],[70,'#d7d34f'],[100,'#4caf50']];
  for (let i = 1; i < stops.length; i++) {
    if (s <= stops[i][0]) {
      const [a, ca] = stops[i-1], [b, cb] = stops[i], t = (s - a) / (b - a);
      const pa = ca.match(/\w\w/g).map(h => parseInt(h, 16));
      const pb = cb.match(/\w\w/g).map(h => parseInt(h, 16));
      return '#' + pa.map((v, j) => Math.round(v + (pb[j] - v) * t)
        .toString(16).padStart(2, '0')).join('');
    }
  }
  return '#4caf50';
}

function collectFilters() {
  const v = id => document.getElementById(id).value;
  filters = {};
  if (v('f_min_score')) filters.min_score = v('f_min_score');
  if (v('f_min_acres')) filters.min_acres = v('f_min_acres');
  if (v('f_max_acres')) filters.max_acres = v('f_max_acres');
  if (v('f_max_drive')) filters.max_drive = v('f_max_drive');
  if (v('f_max_slope')) filters.max_slope = v('f_max_slope');
  if (v('f_min_septic')) filters.min_septic = v('f_min_septic');
  if (v('f_state')) filters.state = v('f_state');
  if (v('f_county_fips')) filters.county_fips = v('f_county_fips');
  if (v('f_address')) filters.address = v('f_address');
  if (v('f_structure')) filters.structure = v('f_structure');
  if (v('f_max_value')) filters.max_value = v('f_max_value');
  if (v('f_max_ppa')) filters.max_ppa = v('f_max_ppa');
  if (v('f_min_nbr_dist')) filters.min_nbr_dist = v('f_min_nbr_dist');
  if (v('f_max_nbr_1km')) filters.max_nbr_1km = v('f_max_nbr_1km');
  if (v('f_min_grocery')) filters.min_grocery = v('f_min_grocery');
  if (document.getElementById('f_dry').checked) filters.dry_only = 1;
  if (document.getElementById('f_sale').checked) filters.for_sale = 1;
  if (document.getElementById('f_public').checked) filters.borders_public = 1;
  return filters;
}

let countyOptions = [];   // {fips, name, state} from /api/counties
function fillCountySelect() {
  const st = document.getElementById('f_state').value;
  const sel = document.getElementById('f_county_fips');
  const cur = sel.value;
  const opts = countyOptions
    .filter(c => !st || c.state === st)
    .sort((a, b) => a.name.localeCompare(b.name));
  sel.innerHTML = '<option value="">all counties</option>' +
    opts.map(c => `<option value="${c.fips}">${c.name} (${c.state})</option>`).join('');
  if (opts.some(c => c.fips === cur)) sel.value = cur;
}
const qs = o => new URLSearchParams(o).toString();

async function loadCounties() {
  const r = await fetch('/api/counties'); const gj = await r.json();
  if (countyLayer) map.removeLayer(countyLayer);
  countyLayer = L.geoJSON(gj, {
    style: f => ({
      color: '#46525f', weight: 1,
      fillColor: f.properties.relevant ? scoreColor(f.properties.avg_score) : '#333',
      fillOpacity: f.properties.relevant ? 0.45 : 0.15,
    }),
    onEachFeature: (f, l) => {
      const p = f.properties;
      l.bindTooltip(`<b>${p.name}, ${p.state}</b><br>` + (p.relevant
        ? `${p.candidates.toLocaleString()} candidates · avg ${p.avg_score}` +
          ` · best ${p.max_score}<br>${p.forsale} for sale · ${Math.round(p.drive)} min drive`
        : 'excluded (urban/city)'), { sticky: true });
      l.on('click', () => map.fitBounds(l.getBounds(), { animate: false }));
    },
  });
  if (map.getZoom() < PARCEL_ZOOM) countyLayer.addTo(map);
  const t = gj.features.reduce((a, f) => a + f.properties.candidates, 0);
  const fs = gj.features.reduce((a, f) => a + f.properties.forsale, 0);
  document.getElementById('hdrstats').textContent =
    `${t.toLocaleString()} candidate parcels · ${fs.toLocaleString()} for sale · ` +
    `${gj.features.filter(f => f.properties.relevant).length} counties`;
  countyOptions = gj.features
    .filter(f => f.properties.relevant)
    .map(f => ({ fips: f.properties.fips, name: f.properties.name,
                 state: f.properties.state }));
  fillCountySelect();
}

let fetchSeq = 0;
async function loadParcels() {
  const seq = ++fetchSeq;
  const b = map.getBounds();
  const bbox = [b.getWest(), b.getSouth(), b.getEast(), b.getNorth()].join(',');
  const r = await fetch(`/api/parcels?bbox=${bbox}&${qs(filters)}`);
  if (seq !== fetchSeq) return;
  if (!r.ok) { setStatus('zoom in for parcels'); return; }
  const gj = await r.json();
  if (parcelLayer) map.removeLayer(parcelLayer);
  parcelLayer = L.geoJSON(gj, {
    style: f => ({
      color: f.properties.listing ? '#ff8c42' : '#0f1216',
      weight: f.properties.listing ? 2.2 : 0.7,
      dashArray: f.properties.listing ? '5 3' : null,
      fillColor: scoreColor(f.properties.score), fillOpacity: 0.62,
    }),
    onEachFeature: (f, l) => {
      const p = f.properties;
      l.bindTooltip(`<b>${p.score}</b> · ${Math.round(p.acres)} ac · ${p.county_name}` +
        (p.listing ? `<br><b>${p.listing}</b>` : ''), { sticky: true });
      l.on('click', () => showDetail(p.id));
    },
  }).addTo(map);
  setStatus(`${gj.features.length}${gj.truncated ? '+' : ''} parcels in view` +
            (gj.truncated ? ' (truncated — zoom or filter)' : ''));
}

function setStatus(t) { document.getElementById('status').textContent = t; }

async function loadShortlist() {
  const r = await fetch(`/api/shortlist?limit=50&${qs(filters)}`);
  const rows = await r.json();
  document.getElementById('list').innerHTML = rows.map(p => `
    <div class="item" onclick="flyTo(${p.lat},${p.lon},${p.id})">
      <div class="top"><span class="score" style="color:${scoreColor(p.score)}">${p.score}</span>
        <span>${p.has_structure ? '⌂ ' : ''}${p.public_land_dist_m != null && p.public_land_dist_m <= 100 ? '🌲 ' : ''}${Math.round(p.acres)} ac</span></div>
      <div class="meta">${p.county_name}, ${p.state_abbr} · ${Math.round(p.drive_minutes)} min ·
        ${p.parcel_local_id}${p.value_per_acre ? ` · $${(+p.value_per_acre).toLocaleString()}/ac` : ''}</div>
      ${p.situs_address ? `<div class="meta">${p.situs_address}</div>` : ''}
    </div>`).join('') || '<div class="item">no matches</div>';
}

function flyTo(lat, lon, id) {
  // animate:false — embedded panes throttle requestAnimationFrame,
  // which stalls Leaflet's animated flyTo indefinitely.
  map.setView([lat, lon], 15, { animate: false });
  showDetail(id);
}

async function showDetail(id) {
  const r = await fetch(`/api/parcel/${id}`); const p = await r.json();
  if (selLayer) map.removeLayer(selLayer);
  selLayer = L.geoJSON(p.geometry, { style: { color: '#fff', weight: 2.5, fill: false } }).addTo(map);
  const comp = [['septic', p.septic_score], ['slope', p.slope_score],
    ['flood', p.flood_score], ['drive', p.drive_score],
    ['size', p.size_score], ['seclusion', p.seclusion_score],
    ['public land', p.public_score], ['neighbors', p.neighbors_score],
    ['remoteness', p.remoteness_score]];
  const fmt = (v, d = 1) => v == null ? '—' : (+v).toFixed(d);
  const g = `https://www.google.com/maps/@?api=1&map_action=map&center=${p.lat},${p.lon}&zoom=16&basemap=satellite`;
  document.getElementById('detail').innerHTML = `
    <span class="close" onclick="closeDetail()">✕</span>
    <h2>${p.parcel_local_id}</h2>
    <div class="meta" style="color:var(--dim)">${p.county_name}, ${p.state_abbr}</div>
    <span class="big" style="color:${scoreColor(p.score)}">${p.score}</span>
    <span style="color:var(--dim)"> / 100</span>
    ${comp.map(([n, v]) => `<div style="display:flex;justify-content:space-between;font-size:11px">
      <span>${n}</span><span>${fmt(v, 0)}</span></div>
      <div class="bar"><i style="width:${v ?? 0}%;background:${scoreColor(v)}"></i></div>`).join('')}
    <table>
      <tr><td>acres</td><td>${fmt(p.acres)}</td></tr>
      <tr><td>drive from Alexandria</td><td>${fmt(p.drive_minutes, 0)} min</td></tr>
      <tr><td>slope mean / p90</td><td>${fmt(p.slope_mean)}° / ${fmt(p.slope_p90)}°</td></tr>
      <tr><td>steep share (&gt;15°)</td><td>${fmt(p.pct_steep)}%</td></tr>
      <tr><td>septic-workable soil</td><td>${fmt(p.pct_septic_ok)}%</td></tr>
      <tr><td>dominant septic class</td><td>${p.septic_dominant ?? '—'}</td></tr>
      <tr><td>flood (SFHA share)</td><td>${fmt(p.sfha_pct)}%</td></tr>
      <tr><td>nearest public road</td><td>${fmt(p.road_dist_m, 0)} m</td></tr>
      <tr><td>public land</td><td>${p.public_land_dist_m != null
        ? `${fmt(p.public_land_dist_m, 0)} m${p.public_land_name ? ' · ' + p.public_land_name : ''}`
        : (p.public_score != null ? '&gt;5 km' : '—')}</td></tr>
      <tr><td>known structure</td><td>${p.has_structure == null ? '—'
        : p.has_structure
          ? `yes · ${p.structure_count} bldg${p.structure_count > 1 ? 's' : ''}` +
            (p.structure_sqft ? ` · ${Math.round(p.structure_sqft).toLocaleString()} sqft max` : '')
          : 'no'}</td></tr>
      <tr><td>nearest dwelling</td><td>${p.nbr_dist_m != null
        ? `${fmt(p.nbr_dist_m, 0)} m · ${p.nbr_cnt_500m ?? 0} ≤500m · ${p.nbr_cnt_1km ?? 0} ≤1km`
        : '—'}</td></tr>
      <tr><td>nearest grocery</td><td>${p.grocery_dist_km != null
        ? `${fmt(p.grocery_dist_km, 1)} km${p.grocery_name ? ' · ' + p.grocery_name : ''}`
        : '—'}</td></tr>
      <tr><td>nearest town (≥2.5k)</td><td>${p.town_dist_km != null
        ? `${fmt(p.town_dist_km, 1)} km${p.town_name ? ' · ' + p.town_name : ''}`
        : '—'}</td></tr>
      ${p.appraised_total != null ? `
      <tr><td>appraised (${p.tax_year ?? '—'})</td>
          <td>$${(+p.appraised_total).toLocaleString()}
              ${p.value_per_acre ? ` · $${(+p.value_per_acre).toLocaleString()}/ac` : ''}</td></tr>
      <tr><td>land / building</td>
          <td>$${(+(p.appraised_land ?? 0)).toLocaleString()} /
              $${(+(p.appraised_building ?? 0)).toLocaleString()}</td></tr>
      ${p.year_built ? `<tr><td>year built</td><td>${p.year_built}</td></tr>` : ''}
      ${p.land_use ? `<tr><td>land use</td><td>${p.land_use}</td></tr>` : ''}
      ${p.sale_price ? `<tr><td>last sale</td>
          <td>$${(+p.sale_price).toLocaleString()}${p.sale_date ? ' · ' + p.sale_date : ''}</td></tr>` : ''}` : ''}
      ${p.owner ? `<tr><td>owner</td><td>${p.owner}</td></tr>` : ''}
      ${p.address ? `<tr><td>address</td><td>${p.address}</td></tr>` : ''}
    </table>
    ${(p.listings || []).map(l => `<div class="listing-tag">${l.listing_kind} · ${l.status ?? '?'}</div>
      <div style="font-size:11px;color:var(--dim)">${l.title ?? ''}</div>`).join('')}
    <div style="margin-top:10px"><a href="${g}" target="_blank">satellite view ↗</a></div>`;
  document.getElementById('detail').style.display = 'block';
}
function closeDetail() {
  document.getElementById('detail').style.display = 'none';
  if (selLayer) { map.removeLayer(selLayer); selLayer = null; }
}

function refreshLayers() {
  if (map.getZoom() >= PARCEL_ZOOM) {
    if (countyLayer && map.hasLayer(countyLayer)) map.removeLayer(countyLayer);
    loadParcels();
  } else {
    if (parcelLayer) { map.removeLayer(parcelLayer); parcelLayer = null; }
    if (countyLayer && !map.hasLayer(countyLayer)) countyLayer.addTo(map);
    setStatus('county view — zoom in for parcels');
  }
}
map.on('moveend', refreshLayers);

function applyFilters() { collectFilters(); loadShortlist(); refreshLayers(); }
function resetFilters() {
  for (const id of ['f_min_score','f_min_acres','f_max_acres','f_max_drive',
                    'f_max_slope','f_min_septic','f_address',
                    'f_max_value','f_max_ppa','f_min_nbr_dist',
                    'f_max_nbr_1km','f_min_grocery'])
    document.getElementById(id).value = '';
  document.getElementById('f_state').value = '';
  document.getElementById('f_county_fips').value = '';
  document.getElementById('f_structure').value = '';
  document.getElementById('f_dry').checked = false;
  document.getElementById('f_sale').checked = false;
  document.getElementById('f_public').checked = false;
  fillCountySelect();
  applyFilters();
}

let weightComponents = [];
async function openWeights() {
  const r = await fetch('/api/weights'); const ws = await r.json();
  weightComponents = ws.map(w => w.component);
  document.getElementById('wrows').innerHTML = ws.map(w => `
    <div class="row"><label>${w.component}</label>
      <input type="range" min="0" max="40" step="1" value="${w.weight}" id="w_${w.component}"
        data-default="${w.default_weight}"
        oninput="document.getElementById('wv_${w.component}').textContent=this.value">
      <span id="wv_${w.component}">${w.weight}</span></div>
    <small>${w.rationale ?? ''}</small>`).join('');
  document.getElementById('weights').style.display = 'flex';
}
async function saveWeights() {
  const body = {};
  for (const c of weightComponents) {
    const el = document.getElementById('w_' + c);
    if (el) body[c] = +el.value;
  }
  await fetch('/api/weights', { method: 'POST',
    headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
  document.getElementById('weights').style.display = 'none';
  await loadCounties(); applyFilters();
}
async function resetWeights() {
  await fetch('/api/weights/reset', { method: 'POST' });
  document.getElementById('weights').style.display = 'none';
  await loadCounties(); applyFilters();
}

(async () => { collectFilters(); await loadCounties(); loadShortlist(); })();
</script>
